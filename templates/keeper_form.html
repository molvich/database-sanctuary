<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
        <title>Admission</title>
    </head>
    <div class="topbar">
        <div class="topbar-left">Admission</div>
        <div class="topbar-right">
            <a href="{{ url_for('index') }}">Back to Main Page</a>
        </div>
    </div>
    <div class="wrap">

        <div class="hero">
            <div class="hero-title">Keeper Onboarding</div>
            <div class="hero-text">Enter new keeper information</div>
        </div>

        {% if error %}
        <div class="form-error">{{ error }}</div>
        {% endif %}

        <div class="form-section">
            <form method="POST" action="{{ url_for('add_keeper') }}">

                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required placeholder="Keeper's full name">
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="text" id="phone" name="phone" required placeholder="### - ####" >
                </div>

                <div class="form-group">
                    <label for="shift">Work Shift</label>
                    <input type="text" id="shift" name="shift" required placeholder="Morning / Afternoon / Night">
                </div>

                <button type="submit" class="submit-btn">Add Keeper</button>
            </form>
        </div>
    </div>
</html>
