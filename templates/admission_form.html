<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
        <title>Admission</title>
    </head>
    <div class="topbar">
        <div class="topbar-left">Admission</div>
        <div class="topbar-right">
            <a href="{{ url_for('index') }}">Back to Main Page</a>
        </div>
    </div>
    <div class="wrap">

        <div class="hero">
            <div class="hero-title">Resident Admission</div>
            <div class="hero-text">Enter Resident information</div>
        </div>

        {% if error %}
        <div class="form-error">{{ error }}</div>
        {% endif %}

        <div class="form-section">
            <form method="POST" action="{{ url_for('add_animal') }}">

                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required placeholder="Resident's name">
                </div>

                <div class="form-group">
                    <label for="age">Age</label>
                    <input type="number" id="age" name="age" required placeholder="0 - 999" min="0" max="999">
                </div>

                <div class="form-group">
                    <label for="sex">Sex</label>
                    <select id="sex" name="sex">
                        <option value="M">Male</option>
                        <option value="F">Female</option>
                        <option value="Unknown">Unknown</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="health">Health Status</label>
                    <input type="text" id="health" name="health" placeholder="Status (e.g. Healthy)">
                </div>

                <div class="form-group">
                    <label for="species_id">Species</label>
                    <select id="species_id" name="species_id" required>
                        <option value="" disabled selected>Select a species</option>
                        {% for s in species %}
                        <option value="{{ s.species_id }}">{{ s.common_name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="exhibit_id">Exhibit</label>
                    <select id="exhibit_id" name="exhibit_id" required>
                        <option value="" disabled selected>Select an exhibit</option>
                        {% for e in exhibits %}
                        <option value="{{ e.exhibit_id }}">{{ e.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="keeper_id">Assigned Keeper</label>
                    <select id="keeper_id" name="keeper_id" required>
                        <option value="" disabled selected>Select a keeper</option>
                        {% for k in keepers %}
                        <option value="{{ k.keeper_id }}">{{ k.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <button type="submit" class="submit-btn">Admit Resident</button>

            </form>
        </div>
    </div>
</html>
